name: Sincronización ERP APEX → Supabase (cada 30 minutos)

on:
  # Ejecutar cada 30 minutos
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  
  # Permitir ejecución manual desde GitHub UI
  workflow_dispatch:  

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 horas máximo
    environment: production  # Usar el environment configurado
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔄 Sincronizar datos (8 endpoints - Sistema Nuevo)
        env:
          ORACLE_APEX_BASE_URL: ${{ secrets.ORACLE_APEX_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python sync_main.py
      
      - name: 📊 Verificar estado
        if: always()
        run: |
          echo "✅ Sincronización completada"
          echo "Ver output arriba para detalles de cada controller"
      
      - name: 💬 Notify on failure
        if: failure()
        run: |
          echo "❌ Sync failed at $(date)"
          echo "Check the logs artifact for details"
